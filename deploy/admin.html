<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PhytoForsan — Backoffice</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<style>
  :root { --deep:#002f2d; --green:#69b626; --line:rgba(18,55,52,.14); --muted:#5f7470; --page:#f3f6f2; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:system-ui,-apple-system,"Segoe UI",sans-serif; color:var(--deep); background:var(--page); }
  header { background:var(--deep); color:#fff; padding:14px 20px; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
  header h1 { font-size:1.05rem; margin:0; font-weight:900; letter-spacing:.02em; }
  .env-badge { font-size:.7rem; font-weight:800; background:rgba(255,255,255,.16); padding:3px 9px; border-radius:999px; }
  .who { font-size:.78rem; opacity:.9; }
  .wrap { max-width:1100px; margin:0 auto; padding:18px; }
  nav.tabs { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:16px; }
  nav.tabs button { border:1px solid var(--line); background:#fff; color:var(--deep); border-radius:999px; padding:8px 14px; font-weight:800; font-size:.82rem; cursor:pointer; }
  nav.tabs button.active { background:var(--deep); color:#fff; border-color:var(--deep); }
  .card { background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:14px; }
  h2 { font-size:1rem; margin:0 0 12px; }
  h3 { font-size:.9rem; margin:14px 0 8px; }
  label { display:block; font-size:.76rem; font-weight:800; color:var(--muted); margin:10px 0 4px; }
  input, select, textarea { width:100%; padding:9px 11px; border:1.5px solid var(--line); border-radius:10px; font-size:.88rem; font-family:inherit; }
  textarea { min-height:64px; resize:vertical; }
  .row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .row4 { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
  button.btn { background:var(--deep); color:#fff; border:none; border-radius:10px; padding:10px 16px; font-weight:800; font-size:.85rem; cursor:pointer; }
  button.btn.secondary { background:#fff; color:var(--deep); border:1.5px solid var(--line); }
  button.btn.danger { background:#c0392b; }
  button.btn.small { padding:6px 10px; font-size:.78rem; }
  table { width:100%; border-collapse:collapse; font-size:.84rem; }
  th, td { text-align:left; padding:8px 10px; border-bottom:1px solid var(--line); }
  th { font-size:.72rem; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); }
  .pill { font-size:.68rem; font-weight:800; padding:2px 8px; border-radius:999px; background:rgba(18,55,52,.08); }
  .pill.published { background:rgba(105,182,38,.18); color:#3f6b1f; }
  .pill.draft { background:rgba(212,155,63,.18); color:#8a5a00; }
  .pill.archived,.pill.hidden { background:rgba(192,57,43,.12); color:#c0392b; }
  .msg { padding:10px 12px; border-radius:10px; font-size:.84rem; margin:10px 0; }
  .msg.ok { background:rgba(105,182,38,.14); color:#3f6b1f; }
  .msg.err { background:rgba(192,57,43,.1); color:#c0392b; }
  .muted { color:var(--muted); font-size:.8rem; }
  .phase-row { border:1px solid var(--line); border-radius:10px; padding:10px; margin-bottom:8px; }
  .hidden { display:none !important; }
  .toolbar { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:10px; }
  .grow { flex:1; }
</style>
</head>
<body>
<header>
  <h1>PhytoForsan · Backoffice</h1>
  <div style="display:flex;align-items:center;gap:12px">
    <span class="env-badge" id="envBadge">env</span>
    <span class="who" id="whoami">niet ingelogd</span>
    <button class="btn secondary small" id="logoutBtn" style="display:none">Uitloggen</button>
  </div>
</header>

<div class="wrap">
  <!-- LOGIN -->
  <div id="loginView" class="card" style="max-width:420px;margin:40px auto">
    <h2>Inloggen</h2>
    <div id="mockNotice" class="msg ok hidden">Testmodus (local_mock): geen Supabase nodig. Klik op "Inloggen als admin (mock)".</div>
    <div id="loginForm">
      <label>E-mailadres</label>
      <input id="loginEmail" type="email" autocomplete="username">
      <label>Wachtwoord</label>
      <input id="loginPass" type="password" autocomplete="current-password">
      <div style="margin-top:12px;display:flex;gap:8px">
        <button class="btn" id="loginBtn">Inloggen</button>
        <button class="btn secondary" id="mockLoginBtn">Inloggen als admin (mock)</button>
      </div>
    </div>
    <p class="msg err hidden" id="loginMsg"></p>
  </div>

  <!-- DENIED -->
  <div id="deniedView" class="card hidden" style="max-width:480px;margin:40px auto">
    <h2>Toegang geweigerd</h2>
    <p class="muted">Dit account heeft geen adminrechten. Vraag een beheerder om je profiel op <code>role = admin</code> te zetten.</p>
    <button class="btn secondary" id="deniedLogout">Uitloggen</button>
  </div>

  <!-- ADMIN -->
  <div id="adminView" class="hidden">
    <nav class="tabs">
      <button data-tab="dashboard" class="active">Dashboard</button>
      <button data-tab="protocols">Protocollen</button>
      <button data-tab="audio">Audio</button>
      <button data-tab="media">Media</button>
      <button data-tab="users">Gebruikers</button>
      <button data-tab="settings">Instellingen</button>
    </nav>
    <div id="tabBody"></div>
  </div>
</div>

<script>
// =====================================================================
// Data-service: werkt in local_mock (localStorage) of via Supabase.
// =====================================================================
const TABLES = ["categories","protocols","protocol_phases","audio_tracks","protocol_audio","media_files","license_records","app_settings","profiles","user_access"];
let sb = null;                  // supabase client (of null in mock)
let session = null;             // { email, role, access_level }
const cfg = getActiveConfig();
document.getElementById("envBadge").textContent = APP_ENV;

const uid = () => (crypto.randomUUID ? crypto.randomUUID() : "id-" + Date.now() + "-" + Math.random().toString(16).slice(2));
const now = () => new Date().toISOString();

// ----- Mock store (localStorage) -----
const MOCK_KEY = "phyto_admin_mock";
function mockLoad() {
  try { return JSON.parse(localStorage.getItem(MOCK_KEY)) || null; } catch { return null; }
}
function mockSave(db) { localStorage.setItem(MOCK_KEY, JSON.stringify(db)); }
function mockSeed() {
  const cats = ["Ademhaling","Humming","Klank","Meditatie","Verdieping"].map((t,i)=>({
    id: uid(), slug: t.toLowerCase(), title: t, description:"", sort_order:i, status:"published", created_at:now(), updated_at:now()
  }));
  const adem = cats[0];
  const p = { id: uid(), slug:"voorbeeld-ademsessie", title:"Voorbeeld ademsessie", category_id: adem.id,
    group_name:null, short_description:"Een korte voorbeeldsessie.", long_description:"", evidence_text:"",
    safety_text:"", closing_text:"", access_tier:"free", requires_deep_access:false, requires_premium:false,
    status:"draft", sort_order:0, image_id:null, night:false, created_at:now(), updated_at:now() };
  const phases = [
    { id:uid(), protocol_id:p.id, sort_order:0, title:"Aankomen", type:"free", duration_seconds:60, inhale_seconds:0,hold_seconds:0,exhale_seconds:0,pause_seconds:0, instruction_text:"Adem vrij.", visual_mode:"slowBreath", cue:"AANKOMEN", created_at:now(), updated_at:now() },
    { id:uid(), protocol_id:p.id, sort_order:1, title:"Ademritme", type:"breath", duration_seconds:180, inhale_seconds:4,hold_seconds:0,exhale_seconds:6,pause_seconds:0, instruction_text:"Adem rustig.", visual_mode:null, cue:"IN", created_at:now(), updated_at:now() }
  ];
  const db = Object.fromEntries(TABLES.map(t=>[t,[]]));
  db.categories = cats; db.protocols = [p]; db.protocol_phases = phases;
  db.app_settings = [
    {key:"app_name", value:"PhytoForsan Relax", updated_at:now()},
    {key:"default_closing_title", value:"AFGEROND", updated_at:now()},
    {key:"default_closing_text", value:"Neem de tijd om de ervaring een plek te geven.", updated_at:now()},
    {key:"default_audio_volume", value:"0.35", updated_at:now()}
  ];
  db.profiles = [{ id:"mock-admin", email:"admin@mock.local", display_name:"Mock admin", role:"admin", access_level:"admin", created_at:now(), updated_at:now() }];
  mockSave(db);
  return db;
}
function mockDb() { return mockLoad() || mockSeed(); }

// ----- Generic CRUD -----
async function dbList(table, filter) {
  if (cfg.useBackend && sb) {
    let q = sb.from(table).select("*");
    if (filter) Object.entries(filter).forEach(([k,v]) => { q = q.eq(k,v); });
    const { data, error } = await q;
    if (error) throw error;
    return data || [];
  }
  let rows = mockDb()[table] || [];
  if (filter) rows = rows.filter(r => Object.entries(filter).every(([k,v]) => r[k] === v));
  return rows.slice();
}
async function dbUpsert(table, rec) {
  rec.updated_at = now();
  if (cfg.useBackend && sb) {
    const { data, error } = await sb.from(table).upsert(rec).select().single();
    if (error) throw error;
    return data;
  }
  const db = mockDb();
  db[table] = db[table] || [];
  if (!rec.id && table !== "app_settings") rec.id = uid();
  if (!rec.created_at) rec.created_at = now();
  const keyField = table === "app_settings" ? "key" : "id";
  const i = db[table].findIndex(r => r[keyField] === rec[keyField]);
  if (i >= 0) db[table][i] = { ...db[table][i], ...rec }; else db[table].push(rec);
  mockSave(db);
  return rec;
}
async function dbDelete(table, id) {
  if (cfg.useBackend && sb) {
    const { error } = await sb.from(table).delete().eq("id", id);
    if (error) throw error;
    return;
  }
  const db = mockDb();
  db[table] = (db[table] || []).filter(r => r.id !== id);
  mockSave(db);
}

// =====================================================================
// Auth
// =====================================================================
async function initAuth() {
  if (cfg.useBackend) {
    sb = createSupabaseClient();
    if (!sb) {
      showLoginMsg("Supabase niet geconfigureerd. Vul je URL/anon key in js/config.js, of zet APP_ENV op local_mock.");
    }
    const { data } = sb ? await sb.auth.getSession() : { data:{ session:null } };
    if (data?.session) await onSignedIn(data.session.user);
  } else {
    document.getElementById("mockNotice").classList.remove("hidden");
  }
}
async function loadProfile(userId, email) {
  if (cfg.useBackend && sb) {
    const { data } = await sb.from("profiles").select("*").eq("id", userId).maybeSingle();
    return data || { email, role:"user", access_level:"free" };
  }
  return mockDb().profiles[0];
}
async function onSignedIn(user) {
  const profile = await loadProfile(user.id, user.email);
  session = { id:user.id, email:profile.email || user.email, role:profile.role, access_level:profile.access_level };
  document.getElementById("whoami").textContent = `${session.email} · ${session.role} · ${session.access_level}`;
  document.getElementById("logoutBtn").style.display = "";
  document.getElementById("loginView").classList.add("hidden");
  if (session.role !== "admin") {
    document.getElementById("deniedView").classList.remove("hidden");
    return;
  }
  document.getElementById("adminView").classList.remove("hidden");
  openTab("dashboard");
}
function showLoginMsg(t) { const e=document.getElementById("loginMsg"); e.textContent=t; e.classList.toggle("hidden", !t); }

document.getElementById("loginBtn").addEventListener("click", async () => {
  showLoginMsg("");
  if (!cfg.useBackend) { showLoginMsg("In local_mock: gebruik de mock-knop."); return; }
  if (!sb) { showLoginMsg("Supabase niet geconfigureerd."); return; }
  const email = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPass").value;
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) { showLoginMsg(error.message); return; }
  await onSignedIn(data.user);
});
document.getElementById("mockLoginBtn").addEventListener("click", async () => {
  if (cfg.useBackend) { showLoginMsg("Mock-login werkt alleen in APP_ENV=local_mock."); return; }
  await onSignedIn({ id:"mock-admin", email:"admin@mock.local" });
});
async function doLogout() {
  if (cfg.useBackend && sb) { try { await sb.auth.signOut(); } catch {} }
  session = null;
  location.reload();
}
document.getElementById("logoutBtn").addEventListener("click", doLogout);
document.getElementById("deniedLogout").addEventListener("click", doLogout);

// =====================================================================
// UI / tabs
// =====================================================================
let editingProtocolId = null;
const tabBody = document.getElementById("tabBody");
document.querySelectorAll("nav.tabs button").forEach(b => b.addEventListener("click", () => openTab(b.dataset.tab)));
function openTab(tab) {
  document.querySelectorAll("nav.tabs button").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
  ({ dashboard:renderDashboard, protocols:renderProtocols, audio:renderAudio, media:renderMedia, users:renderUsers, settings:renderSettings }[tab] || renderDashboard)();
}
const esc = (s) => String(s ?? "").replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));
function totalSeconds(phases) { return (phases||[]).reduce((s,p)=>s+Number(p.duration_seconds||0),0); }
function fmtDur(s){ const m=Math.floor(s/60), r=s%60; return r?`${m}:${String(r).padStart(2,"0")}`:`${m} min`; }

async function renderDashboard() {
  const [prot, cats, phases] = await Promise.all([dbList("protocols"), dbList("categories"), dbList("protocol_phases")]);
  const pub = prot.filter(p=>p.status==="published").length;
  tabBody.innerHTML = `<div class="card"><h2>Dashboard</h2>
    <p class="muted">Omgeving: <b>${APP_ENV}</b> · backend: <b>${cfg.useBackend ? "Supabase" : "lokaal (mock)"}</b></p>
    <div class="row4" style="margin-top:10px">
      <div class="card"><b style="font-size:1.4rem">${prot.length}</b><div class="muted">protocollen</div></div>
      <div class="card"><b style="font-size:1.4rem">${pub}</b><div class="muted">gepubliceerd</div></div>
      <div class="card"><b style="font-size:1.4rem">${cats.length}</b><div class="muted">categorieën</div></div>
      <div class="card"><b style="font-size:1.4rem">${phases.length}</b><div class="muted">fases</div></div>
    </div></div>`;
}

// ---------- Protocollen ----------
async function renderProtocols() {
  editingProtocolId = null;
  const [prot, cats] = await Promise.all([dbList("protocols"), dbList("categories")]);
  const allPhases = await dbList("protocol_phases");
  const catName = (id) => cats.find(c=>c.id===id)?.title || "—";
  const rows = prot.sort((a,b)=>(a.sort_order||0)-(b.sort_order||0)).map(p => {
    const ph = allPhases.filter(x=>x.protocol_id===p.id);
    return `<tr>
      <td><b>${esc(p.title)}</b><div class="muted">${esc(p.slug)}</div></td>
      <td>${esc(catName(p.category_id))}</td>
      <td>${esc(p.access_tier)}</td>
      <td>${fmtDur(totalSeconds(ph))} · ${ph.length} fases</td>
      <td><span class="pill ${p.status}">${p.status}</span></td>
      <td><button class="btn small secondary" data-edit="${p.id}">Bewerken</button></td>
    </tr>`;
  }).join("");
  tabBody.innerHTML = `<div class="card">
    <div class="toolbar"><h2 class="grow">Protocollen</h2>
      <button class="btn secondary" id="exportAll">Exporteer alles</button>
      <button class="btn secondary" id="importBtn">Importeer…</button>
      <input type="file" id="importFile" accept="application/json,.json" style="display:none">
      <button class="btn" id="newProtocol">+ Nieuw protocol</button></div>
    <div id="importMsg" class="muted" style="margin-bottom:8px"></div>
    <table><thead><tr><th>Titel</th><th>Categorie</th><th>Toegang</th><th>Duur</th><th>Status</th><th></th></tr></thead>
    <tbody>${rows || '<tr><td colspan="6" class="muted">Nog geen protocollen.</td></tr>'}</tbody></table>
  </div>`;
  document.getElementById("newProtocol").addEventListener("click", () => editProtocol(null));
  document.getElementById("exportAll").addEventListener("click", exportAllProtocols);
  document.getElementById("importBtn").addEventListener("click", () => document.getElementById("importFile").click());
  document.getElementById("importFile").addEventListener("change", handleImportFile);
  tabBody.querySelectorAll("[data-edit]").forEach(b => b.addEventListener("click", () => editProtocol(b.dataset.edit)));
}

// ---------- Export / Import (los van seed) ----------
function downloadJson(filename, data) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}
// Bouwt een zelfstandig, draagbaar protocol-object (categorie als slug i.p.v. id).
function buildExportEntry(p, phases, cats) {
  const cat = cats.find(c => c.id === p.category_id);
  return {
    protocol: {
      slug: p.slug, title: p.title, category_slug: cat ? cat.slug : null,
      group_name: p.group_name || null,
      short_description: p.short_description || "", long_description: p.long_description || "",
      evidence_text: p.evidence_text || "", safety_text: p.safety_text || "", closing_text: p.closing_text || "",
      access_tier: p.access_tier || "free",
      requires_deep_access: !!p.requires_deep_access, requires_premium: !!p.requires_premium,
      status: p.status || "draft", sort_order: p.sort_order || 0, night: !!p.night
    },
    phases: phases.slice().sort((a,b)=>(a.sort_order||0)-(b.sort_order||0)).map(ph => ({
      sort_order: ph.sort_order || 0, title: ph.title || "", type: ph.type || "free",
      duration_seconds: Number(ph.duration_seconds||0), inhale_seconds: Number(ph.inhale_seconds||0),
      hold_seconds: Number(ph.hold_seconds||0), exhale_seconds: Number(ph.exhale_seconds||0), pause_seconds: Number(ph.pause_seconds||0),
      instruction_text: ph.instruction_text || "", visual_mode: ph.visual_mode || null, cue: ph.cue || null,
      cue_in: ph.cue_in || null, cue_out: ph.cue_out || null, sub_in: ph.sub_in || null, sub_out: ph.sub_out || null
    }))
  };
}
async function exportAllProtocols() {
  const msg = document.getElementById("importMsg");
  const [prot, cats, phases] = await Promise.all([dbList("protocols"), dbList("categories"), dbList("protocol_phases")]);
  const entries = prot.slice().sort((a,b)=>(a.sort_order||0)-(b.sort_order||0))
    .map(p => buildExportEntry(p, phases.filter(x=>x.protocol_id===p.id), cats));
  downloadJson("protocollen-export.json", entries);
  if (msg) msg.textContent = `Geëxporteerd: ${entries.length} protocollen.`;
}
async function exportSingleProtocol(id) {
  const [cats, phases] = await Promise.all([dbList("categories"), dbList("protocol_phases")]);
  const p = (await dbList("protocols")).find(x => x.id === id);
  if (!p) return;
  downloadJson((p.slug || "protocol") + ".json", buildExportEntry(p, phases.filter(x=>x.protocol_id===p.id), cats));
}
// Verwerkt geïmporteerde protocol-objecten (één of meer). Bestaande slug = bijwerken.
async function applyImportEntries(entries) {
  let cats = await dbList("categories");
  const catBySlug = {}; cats.forEach(c => { catBySlug[c.slug] = c; });
  const titleFor = (slug) => slug.charAt(0).toUpperCase() + slug.slice(1);
  let order = cats.length;
  for (const e of entries) {
    const slug = e.protocol.category_slug;
    if (slug && !catBySlug[slug]) {
      const c = await dbUpsert("categories", { slug, title:titleFor(slug), description:"", sort_order:order++, status:"published" });
      catBySlug[slug] = c;
    }
  }
  const existing = await dbList("protocols");
  const bySlug = {}; existing.forEach(p => { bySlug[p.slug] = p; });
  let created = 0, updated = 0;
  for (const e of entries) {
    const src = e.protocol;
    const cat = catBySlug[src.category_slug];
    const prev = bySlug[src.slug];
    const rec = {
      ...(prev ? { id: prev.id } : {}),
      slug: src.slug, title: src.title, category_id: cat ? cat.id : null,
      group_name: src.group_name || null,
      short_description: src.short_description || "", long_description: src.long_description || "",
      evidence_text: src.evidence_text || "", safety_text: src.safety_text || "", closing_text: src.closing_text || "",
      access_tier: src.access_tier || "free",
      requires_deep_access: !!src.requires_deep_access, requires_premium: !!src.requires_premium,
      status: src.status || "draft", sort_order: src.sort_order || 0, night: !!src.night
    };
    const saved = await dbUpsert("protocols", rec);
    if (prev) updated++; else created++;
    // Bestaande fases vervangen
    const oldPhases = await dbList("protocol_phases", { protocol_id: saved.id });
    for (const op of oldPhases) await dbDelete("protocol_phases", op.id);
    for (const ph of (e.phases || [])) {
      await dbUpsert("protocol_phases", {
        protocol_id: saved.id, sort_order: ph.sort_order || 0, title: ph.title || "",
        type: ph.type || "free", duration_seconds: Number(ph.duration_seconds || 0),
        inhale_seconds: Number(ph.inhale_seconds || 0), hold_seconds: Number(ph.hold_seconds || 0),
        exhale_seconds: Number(ph.exhale_seconds || 0), pause_seconds: Number(ph.pause_seconds || 0),
        instruction_text: ph.instruction_text || "", visual_mode: ph.visual_mode || null, cue: ph.cue || "",
        cue_in: ph.cue_in || null, cue_out: ph.cue_out || null, sub_in: ph.sub_in || null, sub_out: ph.sub_out || null
      });
    }
  }
  return { created, updated };
}
async function handleImportFile(ev) {
  const file = ev.target.files[0];
  ev.target.value = ""; // zelfde bestand opnieuw kunnen kiezen
  if (!file) return;
  const msg = document.getElementById("importMsg");
  msg.textContent = "Bezig met importeren…";
  try {
    let data = JSON.parse(await file.text());
    if (!Array.isArray(data)) data = [data]; // één protocol → lijst
    if (!data.length || !data.every(e => e && e.protocol && e.protocol.slug)) {
      throw new Error("Ongeldig bestand: verwacht één of meer objecten met 'protocol.slug' en 'phases'.");
    }
    const res = await applyImportEntries(data);
    msg.textContent = `Klaar: ${res.created} nieuw, ${res.updated} bijgewerkt (van ${data.length}).`;
    setTimeout(renderProtocols, 1200);
  } catch (e) {
    msg.textContent = "Import mislukt: " + (e.message || e);
  }
}

async function editProtocol(id) {
  const cats = await dbList("categories");
  const media = await dbList("media_files", { type:"image" });
  let p = id ? (await dbList("protocols")).find(x=>x.id===id) : null;

async function validateForPublish(p, phases) {
  const errs = [];
  if (!p.slug) errs.push("Slug verplicht.");
  if (!p.title) errs.push("Titel verplicht.");
  if (!p.category_id) errs.push("Categorie verplicht.");
  const all = await dbList("protocols");
  if (p.slug && all.some(x=>x.slug===p.slug && x.id!==p.id)) errs.push("Slug is niet uniek.");
  if (!phases.length) errs.push("Minimaal één fase nodig.");
  if (phases.some(f=>Number(f.duration_seconds)<=0)) errs.push("Iedere fase moet duur > 0 hebben.");
  if (totalSeconds(phases) <= 0) errs.push("Totale duur moet > 0 zijn.");
  return errs;
}

async function saveProtocolForm() {
  const p = readProtocolForm();
  const msg = document.getElementById("protMsg");
  const phases = editingProtocolId ? await dbList("protocol_phases", { protocol_id: editingProtocolId }) : [];
  if (p.status === "published") {
    const errs = await validateForPublish(p, phases);
    if (errs.length) {
      p.status = "draft";
      msg.className = "msg err"; msg.textContent = "Kan niet publiceren (status blijft draft): " + errs.join(" ");
      msg.classList.remove("hidden");
      document.getElementById("f_status").value = "draft";
    }
  }
  try {
    const saved = await dbUpsert("protocols", p);
    editingProtocolId = saved.id;
    if (!(p.status === "draft" && msg.textContent)) { msg.className="msg ok"; msg.textContent="Opgeslagen."; msg.classList.remove("hidden"); }
    renderPhases();
  } catch (e) { msg.className="msg err"; msg.textContent="Fout bij opslaan: "+(e.message||e); msg.classList.remove("hidden"); }
}

// ---------- Fasebeheer ----------
async function renderPhases() {
  const wrap = document.getElementById("phasesWrap");
  if (!editingProtocolId) { wrap.innerHTML = `<p class="muted" style="margin-top:16px">Sla het protocol eerst op om fases toe te voegen.</p>`; return; }
  const phases = (await dbList("protocol_phases", { protocol_id: editingProtocolId })).sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
  const typeOpt = (v)=>["breath","free","humming","sound","silence","integration","warning"].map(t=>`<option ${t===v?"selected":""}>${t}</option>`).join("");
  const invalid = phases.some(f=>Number(f.duration_seconds)<=0);
  wrap.innerHTML = `<h3>Fases — totale duur ${fmtDur(totalSeconds(phases))} · ${phases.length} fases ${invalid?'<span class="pill archived">ongeldige fase</span>':''}</h3>
    ${phases.map(f=>`<div class="phase-row" data-ph="${f.id}">
      <div class="row"><div><label>Titel</label><input class="ph_title" value="${esc(f.title)}"></div>
      <div><label>Type</label><select class="ph_type">${typeOpt(f.type)}</select></div></div>
      <div class="row4">
        <div><label>Duur (s)</label><input class="ph_dur" type="number" value="${f.duration_seconds||0}"></div>
        <div><label>In (s)</label><input class="ph_in" type="number" step="0.5" value="${f.inhale_seconds||0}"></div>
        <div><label>Hold (s)</label><input class="ph_hold" type="number" step="0.5" value="${f.hold_seconds||0}"></div>
        <div><label>Uit (s)</label><input class="ph_ex" type="number" step="0.5" value="${f.exhale_seconds||0}"></div>
      </div>
      <div class="row4">
        <div><label>Pauze (s)</label><input class="ph_pause" type="number" step="0.5" value="${f.pause_seconds||0}"></div>
        <div><label>visual_mode</label><input class="ph_vis" value="${esc(f.visual_mode)}"></div>
        <div><label>cue (rustfase)</label><input class="ph_cue" value="${esc(f.cue)}"></div>
        <div><label>volgorde</label><input class="ph_sort" type="number" value="${f.sort_order||0}"></div>
      </div>
      <p class="muted" style="margin:6px 0 2px">Teksten in de sessie-cirkel</p>
      <div class="row">
        <div><label>Cue-woord inademen</label><input class="ph_cuein" value="${esc(f.cue_in)}" placeholder="IN"></div>
        <div><label>Cue-woord uitademen</label><input class="ph_cueout" value="${esc(f.cue_out)}" placeholder="UIT"></div>
      </div>
      <label>Subtekst bij inademen</label><textarea class="ph_subin">${esc(f.sub_in)}</textarea>
      <label>Subtekst bij uitademen</label><textarea class="ph_subout">${esc(f.sub_out)}</textarea>
      <label>Instructietekst (rustfase)</label><textarea class="ph_instr">${esc(f.instruction_text)}</textarea>
      <div style="margin-top:8px;display:flex;gap:8px"><button class="btn small ph_save">Fase opslaan</button><button class="btn small danger ph_del">Verwijderen</button></div>
    </div>`).join("")}
    <button class="btn secondary small" id="addPhase" style="margin-top:8px">+ Fase toevoegen</button>`;
  document.getElementById("addPhase").addEventListener("click", async () => {
    await dbUpsert("protocol_phases", { protocol_id:editingProtocolId, sort_order:phases.length, title:"Nieuwe fase", type:"free", duration_seconds:60, inhale_seconds:0,hold_seconds:0,exhale_seconds:0,pause_seconds:0, instruction_text:"", visual_mode:"slowBreath", cue:"" });
    renderPhases();
  });
  wrap.querySelectorAll(".phase-row").forEach(rowEl => {
    const pid = rowEl.dataset.ph;
    rowEl.querySelector(".ph_save").addEventListener("click", async () => {
      const g=(c)=>rowEl.querySelector(c);
      await dbUpsert("protocol_phases", { id:pid, protocol_id:editingProtocolId,
        title:g(".ph_title").value, type:g(".ph_type").value, duration_seconds:Number(g(".ph_dur").value)||0,
        inhale_seconds:Number(g(".ph_in").value)||0, hold_seconds:Number(g(".ph_hold").value)||0,
        exhale_seconds:Number(g(".ph_ex").value)||0, pause_seconds:Number(g(".ph_pause").value)||0,
        visual_mode:g(".ph_vis").value||null, cue:g(".ph_cue").value||null, sort_order:Number(g(".ph_sort").value)||0,
        cue_in:g(".ph_cuein").value||null, cue_out:g(".ph_cueout").value||null,
        sub_in:g(".ph_subin").value||null, sub_out:g(".ph_subout").value||null,
        instruction_text:g(".ph_instr").value });
      renderPhases();
    });
    rowEl.querySelector(".ph_del").addEventListener("click", async () => { await dbDelete("protocol_phases", pid); renderPhases(); });
  });
}

const mediaThumb = (m, size=40) => {
  const src = m.data_url || m.storage_path;
  return (m.type === "image" && src)
    ? `<img src="${esc(src)}" style="width:${size}px;height:${size}px;object-fit:cover;border-radius:6px;background:#eee" alt="">`
    : `<span class="muted">—</span>`;
};
async function renderMedia() {
  const media = await dbList("media_files");
  tabBody.innerHTML = `<div class="card"><div class="toolbar"><h2 class="grow">Media</h2><button class="btn" id="newMedia">+ Nieuw bestand</button></div>
    <table><thead><tr><th></th><th>Bestand</th><th>Type</th><th>Bron/pad</th><th>Licentie</th><th></th></tr></thead>
    <tbody>${media.map(m=>`<tr><td>${mediaThumb(m)}</td><td>${esc(m.filename)}</td><td>${esc(m.type)}</td><td class="muted">${esc(m.data_url ? "(geüpload)" : m.storage_path)}</td><td>${esc(m.license)}</td><td><button class="btn small secondary" data-edit="${m.id}">Bewerken</button> <button class="btn small danger" data-del="${m.id}">Verwijderen</button></td></tr>`).join("")||'<tr><td colspan="6" class="muted">Nog geen media.</td></tr>'}</tbody></table></div>
    <div id="mediaForm"></div>`;
  document.getElementById("newMedia").addEventListener("click", ()=>editMedia(null));
  tabBody.querySelectorAll("[data-edit]").forEach(b=>b.addEventListener("click",()=>editMedia(b.dataset.edit)));
  tabBody.querySelectorAll("[data-del]").forEach(b=>b.addEventListener("click",async()=>{ if(confirm("Dit mediabestand verwijderen?")){ await dbDelete("media_files", b.dataset.del); renderMedia(); }}));
}
async function editMedia(id) {
  let m = id ? (await dbList("media_files")).find(x=>x.id===id) : { filename:"", type:"image", storage_path:"", data_url:"", alt_text:"", source:"", license:"", notes:"" };
  const typeOpt=(v)=>["image","audio","document","license_proof","other"].map(t=>`<option ${t===v?"selected":""}>${t}</option>`).join("");
  let dataUrl = m.data_url || "";
  const previewSrc = () => dataUrl || document.getElementById("m_storage_path").value;
  document.getElementById("mediaForm").innerHTML = `<div class="card"><h3>${id?"Media bewerken":"Nieuw bestand"}</h3>
    <label>Bestandsnaam</label><input id="m_filename" value="${esc(m.filename)}">
    <label>Type</label><select id="m_type">${typeOpt(m.type)}</select>
    <label>Afbeelding uploaden</label><input id="m_file" type="file" accept="image/*">
    <p class="muted" style="margin:2px 0 8px">Of geef hieronder een URL / pad op. Een upload heeft voorrang.</p>
    <label>URL of pad</label><input id="m_storage_path" value="${esc(m.storage_path)}" placeholder="tegels/voorbeeld.webp of https://…">
    <div id="m_preview" style="margin:8px 0">${ (m.type==="image" && (dataUrl||m.storage_path)) ? `<img src="${esc(dataUrl||m.storage_path)}" style="max-width:160px;max-height:120px;border-radius:8px;border:1px solid #ddd">` : "" }</div>
    <label>Alt-tekst</label><input id="m_alt_text" value="${esc(m.alt_text)}">
    <label>Bron</label><input id="m_source" value="${esc(m.source)}">
    <label>Licentie</label><input id="m_license" value="${esc(m.license)}">
    <label>Notities</label><textarea id="m_notes">${esc(m.notes)}</textarea>
    <p class="msg hidden" id="m_msg"></p>
    <button class="btn" id="saveMedia" style="margin-top:8px">Opslaan</button></div>`;
  const prev = document.getElementById("m_preview");
  const renderPrev = () => { const s = previewSrc(); prev.innerHTML = s ? `<img src="${esc(s)}" style="max-width:160px;max-height:120px;border-radius:8px;border:1px solid #ddd">` : ""; };
  document.getElementById("m_storage_path").addEventListener("input", renderPrev);
  document.getElementById("m_file").addEventListener("change", (e) => {
    const file = e.target.files[0]; if (!file) return;
    const msg = document.getElementById("m_msg");
    if (file.size > 1.5*1024*1024) { msg.className="msg err"; msg.textContent="Afbeelding is groter dan 1,5 MB. Kies een kleiner bestand of gebruik een URL."; msg.classList.remove("hidden"); return; }
    const reader = new FileReader();
    reader.onload = () => { dataUrl = reader.result; if(!document.getElementById("m_filename").value) document.getElementById("m_filename").value = file.name; renderPrev(); };
    reader.readAsDataURL(file);
  });
  document.getElementById("saveMedia").addEventListener("click", async () => {
    const rec = { id, filename:document.getElementById("m_filename").value, type:document.getElementById("m_type").value, storage_path:document.getElementById("m_storage_path").value, data_url: dataUrl || null, alt_text:document.getElementById("m_alt_text").value, source:document.getElementById("m_source").value, license:document.getElementById("m_license").value, notes:document.getElementById("m_notes").value };
    if (!rec.id) delete rec.id;
    await dbUpsert("media_files", rec); renderMedia();
  });
}
